services:
  - type: web
    name: jackies-tees
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install --include=dev && cd server && npm install --include=dev && cd ../client && npm install --include=dev && cd .. && npm run build
    startCommand: cd server && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
